name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o rickspanish-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o rickspanish-darwin-arm64 .
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o rickspanish-linux-amd64 .
          GOOS=linux   GOARCH=arm64  go build -ldflags="-s -w" -o rickspanish-linux-arm64 .
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w" -o rickspanish-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rickspanish-darwin-amd64
            rickspanish-darwin-arm64
            rickspanish-linux-amd64
            rickspanish-linux-arm64
            rickspanish-windows-amd64.exe
          generate_release_notes: true
